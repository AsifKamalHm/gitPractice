name: "01- Work flow Inputs Demo" 
on:
  workflow_dispatch:
    inputs:
      enviroment:
        description: 'please select the environment'
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - production
      perform-smoke-test:
        description: 'Do you want to perform smoke test?'
        required: true
        type: boolean
        default: false

env:
  APPLICATION_NAME: 'my-app'
  DOCKER_USER_NAME: githubactions12
  IMAGE_TAG: v1.0.0

jobs:
  flask-ci-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Display input values
        run: |
          echo "enviroment: ${{ inputs.enviroment }}"
          echo "perform-smoke-test: ${{ inputs.perform-smoke-test }}"

      # Login first so Docker Hub authentication is ready for any environment push
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.TOKEN }}

      # Only runs if 'dev' is selected
      - name: qa validation
        if: ${{ inputs.enviroment == 'dev' }}
        run: echo "Hello, QA validation!"

      # Only runs if 'staging' or 'production' is selected
      - name: Build and push
        if: ${{ inputs.enviroment != 'dev' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USER_NAME }}/${{ env.APPLICATION_NAME }}:${{ env.IMAGE_TAG }}
      - name: smoke test
        if: ${{ inputs.perform-smoke-test == 'true' }}
        run: |
            sleep 6
            curl http://localhost:5000/health
            echo "Smoke test completed successfully!"
      - name: push to kubernets
        if: ${{ inputs.enviroment == 'production' }}
        run: |
            echo "Pushing to kubernetes cluster"
            echo "Deploying to production environment"
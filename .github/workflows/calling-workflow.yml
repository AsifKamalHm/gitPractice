name: caller workflow
on:
  workflow_dispatch:

jobs:
  call-reusable: # Fixed spelling typo
    uses: ./.github/workflows/resuable-workflow-out.yml
    with:
      name: "John Doe"
      age: 30
      city: "New York"

  consume-outputs:
    needs: call-reusable # Matches the fixed job name above
    runs-on: ubuntu-latest # Fixed: Changed to lowercase 'latest'
    steps:
      - name: Print outputs
        run: |
          echo "Name: ${{ needs.call-reusable.outputs.name }}"
          echo "Age: ${{ needs.call-reusable.outputs.age }}"
          echo "City: ${{ needs.call-reusable.outputs.city }}"